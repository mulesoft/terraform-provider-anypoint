version: "2"

run:
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mulesoft/terraform-provider-anypoint
  exclusions:
    paths:
      - vendor
      - .git
      - dist

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocyclo
    - revive
    - gosec
    - goconst
    - unparam
    - nakedret
    - prealloc
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable:
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/hashicorp/terraform-plugin-log/tflog).Trace
            - (github.com/hashicorp/terraform-plugin-log/tflog).Debug
            - (github.com/hashicorp/terraform-plugin-log/tflog).Info
            - (github.com/hashicorp/terraform-plugin-log/tflog).Warn
            - (github.com/hashicorp/terraform-plugin-log/tflog).Error
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 2
      min-occurrences: 3
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    gocritic:
      enabled-tags:
        - performance
        - style
        - experimental
      disabled-checks:
        - wrapperFunc
        - dupImport
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    paths:
      - vendor
      - .git
      - dist
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - goconst
          - unparam
      - path: main\.go
        linters:
          - gocyclo
      - path: '.*\.gen\.go'
        linters:
          - lll
      - path: internal/
        text: "exported .* should have comment"
        linters:
          - revive
      - path: _test\.go
        text: "fieldalignment:"
        linters:
          - govet
      - path: main\.go
        text: "G101|G102"
        linters:
          - gosec
      - path: '(.+)\.go$'
        text: "should have( a package)? comment"
      - path: '(.+)\.go$'
        text: "^G103: Use of unsafe calls should be audited"
      - path: '(.+)\.go$'
        text: "G304: Potential file inclusion via variable"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default: error
  rules:
    - linters:
        - dupl
      severity: info
    - linters:
        - goconst
      severity: info
