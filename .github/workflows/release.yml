# Terraform Provider release workflow
# Triggered when a version tag (v*) is pushed.
# Builds cross-platform binaries, signs the SHA256SUMS with GPG,
# and publishes a GitHub Release that the Terraform Registry can poll.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: mulesoft-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          FINGERPRINT=$(gpg --list-secret-keys --keyid-format LONG --with-colons | awk -F: '/^fpr/ { print $10; exit }')
          echo "GPG_FINGERPRINT=$FINGERPRINT" >> "$GITHUB_ENV"
          # Mark key as ultimately trusted so gpg doesn't prompt
          echo "$FINGERPRINT:6:" | gpg --import-ownertrust

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ env.GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.PASSPHRASE }}
