# Terraform Provider release workflow
# Triggered when a version tag (v*) is pushed.
# Builds cross-platform binaries, signs the SHA256SUMS with GPG,
# and publishes a GitHub Release that the Terraform Registry can poll.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: mulesoft-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
        id: import_gpg_raw

      - name: Get GPG fingerprint
        id: import_gpg
        run: |
          FINGERPRINT=$(gpg --list-secret-keys --keyid-format LONG --with-colons | awk -F: '/^fpr/ { print $10; exit }')
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
